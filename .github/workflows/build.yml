name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  allknower-check:
    name: AllKnower — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: allknower
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Typecheck + tests
        run: bun run check
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          BETTER_AUTH_SECRET: ci-placeholder-secret-minimum-16-chars
          OPENROUTER_API_KEY: sk-or-placeholder
          ALLCODEX_ETAPI_TOKEN: placeholder-token

  portal-check:
    name: Portal — typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: allcodex-portal
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck + unit tests
        run: bun run check

  core-typecheck:
    name: AllCodex Core — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: allcodex-core
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: allcodex-core/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
