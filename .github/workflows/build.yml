name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  allknower-check:
    name: AllKnower — typecheck + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: allknower
          POSTGRES_PASSWORD: allknower
          POSTGRES_DB: allknower_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: allknower
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-allknower-${{ hashFiles('allknower/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-allknower-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply migrations
        run: bunx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://allknower:allknower@localhost:5432/allknower_test

      - name: Typecheck + tests
        run: bun run check
        env:
          DATABASE_URL: postgresql://allknower:allknower@localhost:5432/allknower_test
          BETTER_AUTH_SECRET: ci-placeholder-secret-minimum-16-chars
          OPENROUTER_API_KEY: sk-or-placeholder
          ALLCODEX_ETAPI_TOKEN: placeholder-token

  portal-check:
    name: Portal — typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: allcodex-portal
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-portal-${{ hashFiles('allcodex-portal/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-portal-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck + unit tests
        run: bun run check

  core-typecheck:
    name: AllCodex Core — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: allcodex-core
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: allcodex-core/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --build apps/server
