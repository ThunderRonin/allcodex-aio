name: Build and Deploy Stack

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & Push AllCodex Core ──────────────────────────────────────────
      - name: Build & Push Core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/core.Dockerfile
          push: true
          tags: |
            ghcr.io/thunderronin/allcodex-core:dev
            ghcr.io/thunderronin/allcodex-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push AllKnower ──────────────────────────────────────────────
      - name: Build & Push AllKnower
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/knower.Dockerfile
          push: true
          tags: |
            ghcr.io/thunderronin/allknower:dev
            ghcr.io/thunderronin/allknower:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push AllCodex Portal ────────────────────────────────────────
      - name: Build & Push Portal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/portal.Dockerfile
          push: true
          tags: |
            ghcr.io/thunderronin/allcodex-portal:dev
            ghcr.io/thunderronin/allcodex-portal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cogitator
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/allcodex-aio
            # Pull the latest compose file changes
            git pull
            # Log in to GHCR on the server using a Deploy Token or simply pull if public package,
            # but since we push with GITHUB_TOKEN, packages might be private by default.
            # To be safe, we can pull the images
            docker compose pull
            # Restart containers
            docker compose up -d
            # Clean up old dangling images to save disk space
            docker image prune -a -f
