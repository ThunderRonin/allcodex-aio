                - paragraph [ref=e196]: Known across the All Reach as "The Thunder Lord," Zaheer stands as the Supreme Marshal of the Übermenschreich's armies and the most feared of The Elder's five Archons. Engineered as a paragon of genetic perfection, he embodies the Reich's ideal of cold, calculated supremacy. His loyalty to The Elder is absolute—a devotion so uncompromising that he once executed an entire battalion of his own soldiers for retreating without orders, then proceeded to win the battle single-handedly. Zaheer commands the entire war machine of the empire, serving as its deadliest combatant and the living instrument of its wrath.
                - paragraph [ref=e197]: His abilities extend far beyond the already formidable baseline of the Empowered. Zaheer possesses superhuman strength, durability, speed, and the power of flight. His reflexes operate at hypersonic levels, granting him near-precognitive spatial awareness. He can survive the vacuum of space, extreme temperatures, and pressures without harm. His body regenerates organs rapidly, allowing him to fight through catastrophic injury—only the destruction of his brain or heart can end him. With a lifespan measured in millennia, he grows passively stronger the longer he survives and fights. Absolute biological immunity shields him from disease, parasites, and prions. Most distinctively, Zaheer wields limited electrokinesis and thunder manipulation, making his epithet entirely literal. He can call down lightning and weaponize the storm itself on the battlefield.
